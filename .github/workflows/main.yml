name: Build PS Vita DLNA Receiver

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: vitasdk/vitasdk:latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies (Alpine)
      run: |
        apk update
        apk add --no-cache cmake make gcc git

    - name: Configure Build
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake -DCMAKE_BUILD_TYPE=Release

    - name: Compile
      run: |
        cd build
        make -j$(nproc)

    - name: Verify VPK
      run: |
        cd build
        ls -la *.vpk || echo "Warning: VPK not found"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VitaDLNAReceiver
        path: build/*.vpk
        retention-days: 7
        compression-level: 6
